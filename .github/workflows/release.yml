name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release:
    name: Build Release (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: openmm
            asset: openmm-linux-x86_64.tar.gz
            upx: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: openmm.exe
            asset: openmm-windows-x86_64.zip
            upx: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: openmm
            asset: openmm-macos-x86_64.tar.gz
            upx: true
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: openmm
            asset: openmm-macos-aarch64.tar.gz
            upx: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libasound2-dev libudev-dev pkg-config libwayland-dev libxkbcommon-dev mold

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install UPX (Linux)
        if: matrix.os == 'ubuntu-latest' && matrix.upx
        run: sudo apt-get install -y upx

      - name: Install UPX (macOS)
        if: matrix.os == 'macos-latest' && matrix.upx
        run: brew install upx

      - name: Install UPX (Windows)
        if: matrix.os == 'windows-latest' && matrix.upx
        run: choco install upx --no-progress

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Compress binary with UPX
        if: matrix.upx
        run: upx --lzma target/${{ matrix.target }}/release/${{ matrix.artifact }}

      - name: Create archive (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p release_staging
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} release_staging/
          cp -r openmm/assets release_staging/
          tar czf ${{ matrix.asset }} -C release_staging .

      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release_staging
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.artifact }} release_staging/
          Copy-Item -Recurse openmm/assets release_staging/assets
          Compress-Archive -Path release_staging/* -DestinationPath ${{ matrix.asset }}

      - name: Generate checksum
        shell: bash
        run: |
          if command -v sha256sum &>/dev/null; then
            sha256sum ${{ matrix.asset }} > ${{ matrix.asset }}.sha256
          else
            shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256
          generate_release_notes: true
          body: |
            ## Installation

            1. Download the binary for your platform below
            2. Extract the archive
            3. Place your Might and Magic VI game data as `mm6/` next to the executable (see [README](https://github.com/${{ github.repository }}/blob/main/README.md#game-data-setup))
            4. Run the executable

            Verify your download with the `.sha256` file:
            ```
            sha256sum -c openmm-linux-x86_64.tar.gz.sha256
            ```
